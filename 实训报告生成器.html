<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实训报告生成器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #f9fbfc;
      --text: #16202a;
      --muted: #667481;
      --line: #d9e0e6;
      --accent: #16746f;
      --accent-2: #0f5f8c;
      --warn: #a96511;
      --danger: #a93434;
      --shadow: 0 18px 42px rgba(20, 31, 43, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 700;
      font-size: 18px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      flex: 0 0 auto;
    }

    .server-state {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(330px, 430px) minmax(0, 1fr);
      gap: 18px;
      width: min(1220px, calc(100vw - 32px));
      margin: 18px auto;
      min-height: calc(100vh - 94px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .panel-body {
      padding: 16px;
    }

    .dropzone {
      min-height: 190px;
      display: grid;
      place-items: center;
      padding: 20px;
      border: 2px dashed #aab7c2;
      border-radius: var(--radius);
      background: #fbfcfd;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .dropzone.dragging {
      border-color: var(--accent);
      background: #edf8f6;
      transform: translateY(-1px);
    }

    .drop-inner {
      text-align: center;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .drop-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #e5f2f0;
      color: var(--accent);
      font-size: 28px;
      font-weight: 800;
    }

    .drop-title {
      font-weight: 700;
      font-size: 16px;
    }

    .drop-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      max-width: 300px;
    }

    .file-input {
      display: none;
    }

    .file-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: 210px;
      overflow: auto;
      padding-right: 2px;
    }

    .file-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
    }

    .file-index {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: #eef2f5;
      color: #35414d;
      font-size: 12px;
      font-weight: 700;
    }

    .file-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .icon-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .icon-button:hover {
      color: var(--danger);
      background: #fff1f1;
      border-color: #f0c8c8;
    }

    .settings {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #33414f;
      font-size: 12px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 116, 111, 0.14);
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      color: #33414f;
      font-size: 13px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      cursor: pointer;
    }

    .ai-box {
      display: none;
      gap: 10px;
      padding: 12px;
      border: 1px solid #cfe0df;
      border-radius: var(--radius);
      background: #f5fbfa;
    }

    .ai-box.show {
      display: grid;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    .primary,
    .secondary,
    .download {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .primary {
      color: #ffffff;
      background: var(--accent);
    }

    .primary:hover {
      background: #126660;
    }

    .primary:disabled {
      cursor: not-allowed;
      background: #90aaa7;
    }

    .secondary {
      color: #31404e;
      background: #ffffff;
      border-color: var(--line);
    }

    .secondary:hover {
      background: #f4f7f9;
    }

    .output-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .result-area {
      display: grid;
      gap: 14px;
      padding: 16px;
      min-height: 100%;
      align-content: start;
    }

    .status-strip {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: 74px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .status-symbol {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #eef2f5;
      color: #52616f;
      font-size: 24px;
      font-weight: 800;
    }

    .status-symbol.ok {
      background: #e3f4ec;
      color: #167246;
    }

    .status-symbol.warn {
      background: #fff2dc;
      color: var(--warn);
    }

    .status-symbol.error {
      background: #ffecec;
      color: var(--danger);
    }

    .status-title {
      font-size: 15px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .status-copy {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .download-box {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border: 1px solid #cde4dd;
      border-radius: var(--radius);
      background: #f0f8f5;
    }

    .download-box.show {
      display: flex;
    }

    .download-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .download {
      color: #ffffff;
      background: var(--accent-2);
    }

    .download:hover {
      background: #0c547c;
    }

    .log {
      min-height: 360px;
      max-height: calc(100vh - 280px);
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid #202a33;
      border-radius: var(--radius);
      background: #121820;
      color: #d8e0e7;
      font-family: Consolas, "Times New Roman", monospace;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .muted-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      font-size: 13px;
    }

    .muted-button:hover {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 0 14px;
      }

      .server-state {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .workspace {
        width: calc(100vw - 20px);
        margin: 10px auto;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .download-box {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">文</div>
        <div>实训报告生成器</div>
      </div>
      <div class="server-state" id="serverState">本地服务检测中...</div>
    </header>

    <section class="workspace">
      <section class="panel">
        <div class="panel-header">
          <h1 class="panel-title">TXT 输入窗口</h1>
          <button class="muted-button" id="clearFiles" type="button">清空</button>
        </div>
        <div class="panel-body">
          <div class="dropzone" id="dropzone" tabindex="0">
            <input class="file-input" id="fileInput" type="file" accept=".txt,text/plain" multiple>
            <div class="drop-inner">
              <div class="drop-icon">+</div>
              <div class="drop-title">拖入 TXT 文件</div>
              <div class="drop-subtitle">文件名按“月-日-次”识别，同月同日的 TXT 会先合并为同一天，再生成第一天、第二天。</div>
            </div>
          </div>

          <div class="file-list" id="fileList"></div>

          <div class="settings">
            <div class="field-grid">
              <div class="field full">
                <label for="outputName">输出 Word 文件名</label>
                <input id="outputName" type="text" placeholder="例如：班级-组号-学号-姓名.docx">
              </div>
              <div class="field">
                <label for="className">班级</label>
                <input id="className" type="text" placeholder="班级">
              </div>
              <div class="field">
                <label for="group">组别</label>
                <input id="group" type="text" placeholder="组号">
              </div>
              <div class="field">
                <label for="studentId">学号</label>
                <input id="studentId" type="text" placeholder="学号">
              </div>
              <div class="field">
                <label for="studentName">姓名</label>
                <input id="studentName" type="text" placeholder="姓名">
              </div>
              <div class="field">
                <label for="college">学院</label>
                <input id="college" type="text" placeholder="学院">
              </div>
              <div class="field">
                <label for="majorClass">专业班级</label>
                <input id="majorClass" type="text" placeholder="专业班级">
              </div>
              <div class="field">
                <label for="maxTasks">每天最多任务数</label>
                <input id="maxTasks" type="number" min="1" max="20" value="8">
              </div>
              <div class="field">
                <label for="templatePath">模板路径</label>
                <input id="templatePath" type="text" placeholder="留空使用默认模板">
              </div>
            </div>

            <div class="option-row">
              <label class="check"><input id="fillCover" type="checkbox"> 填写封面</label>
              <label class="check"><input id="dayPageBreak" type="checkbox"> 每天分页</label>
              <label class="check"><input id="aiEnabled" type="checkbox"> AI 增强</label>
            </div>

            <div class="ai-box" id="aiBox">
              <div class="option-row">
                <button class="secondary" id="deepseekPresetBtn" type="button">填入 DeepSeek 预设</button>
              </div>
              <div class="field-grid">
                <div class="field full">
                  <label for="aiBaseUrl">AI API 地址</label>
                  <input id="aiBaseUrl" type="text" placeholder="DeepSeek：https://api.deepseek.com">
                </div>
                <div class="field">
                  <label for="aiModel">模型名</label>
                  <input id="aiModel" type="text" placeholder="例如：deepseek-v4-flash">
                </div>
                <div class="field">
                  <label for="aiTemperature">温度</label>
                  <input id="aiTemperature" type="number" min="0" max="1.5" step="0.1" value="0.2">
                </div>
                <div class="field full">
                  <label for="aiApiKey">API Key</label>
                  <input id="aiApiKey" type="password" placeholder="按平台要求填写；无鉴权接口可留空">
                </div>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="generateBtn" type="button"><span>▶</span><span>生成 Word</span></button>
            <button class="secondary" id="sampleBtn" type="button"><span>↺</span><span>重置</span></button>
          </div>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-header">
          <h2 class="panel-title">产出窗口</h2>
          <button class="muted-button" id="clearLog" type="button">清日志</button>
        </div>
        <div class="result-area">
          <div class="status-strip">
            <div class="status-symbol" id="statusSymbol">·</div>
            <div>
              <div class="status-title" id="statusTitle">等待 TXT 文件</div>
              <div class="status-copy" id="statusCopy">把 TXT 拖到左侧后点击生成，Word 会在这里出现下载按钮。</div>
            </div>
          </div>

          <div class="download-box" id="downloadBox">
            <div class="download-name" id="downloadName"></div>
            <a class="download" id="downloadLink" href="#" download><span>↓</span><span>下载 Word</span></a>
          </div>

          <pre class="log" id="log"></pre>
        </div>
      </section>
    </section>
  </main>

  <script>
    const apiBase = location.protocol.startsWith("http") ? location.origin : "http://127.0.0.1:8765";
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");
    const generateBtn = document.getElementById("generateBtn");
    const clearFilesBtn = document.getElementById("clearFiles");
    const sampleBtn = document.getElementById("sampleBtn");
    const clearLogBtn = document.getElementById("clearLog");
    const deepseekPresetBtn = document.getElementById("deepseekPresetBtn");
    const logBox = document.getElementById("log");
    const statusSymbol = document.getElementById("statusSymbol");
    const statusTitle = document.getElementById("statusTitle");
    const statusCopy = document.getElementById("statusCopy");
    const serverState = document.getElementById("serverState");
    const downloadBox = document.getElementById("downloadBox");
    const downloadName = document.getElementById("downloadName");
    const downloadLink = document.getElementById("downloadLink");

    let selectedFiles = [];

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logBox.textContent += `[${time}] ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function setStatus(kind, title, copy) {
      statusSymbol.className = `status-symbol ${kind || ""}`;
      statusSymbol.textContent = kind === "ok" ? "✓" : kind === "error" ? "!" : kind === "warn" ? "…" : "·";
      statusTitle.textContent = title;
      statusCopy.textContent = copy;
    }

    function addFiles(fileListLike) {
      const incoming = Array.from(fileListLike).filter(file => file.name.toLowerCase().endsWith(".txt"));
      const keys = new Set(selectedFiles.map(file => `${file.name}-${file.size}-${file.lastModified}`));
      for (const file of incoming) {
        const key = `${file.name}-${file.size}-${file.lastModified}`;
        if (!keys.has(key)) {
          selectedFiles.push(file);
          keys.add(key);
        }
      }
      selectedFiles.sort((a, b) => naturalCompare(a.name, b.name));
      renderFiles();
      if (incoming.length) {
        setStatus("warn", `已选择 ${selectedFiles.length} 个 TXT`, "同月同日的 TXT 会自动整合为同一天。");
        log(`加入 TXT：${incoming.map(file => file.name).join("、")}`);
      }
    }

    function renderFiles() {
      fileList.innerHTML = "";
      selectedFiles.forEach((file, index) => {
        const row = document.createElement("div");
        row.className = "file-row";
        row.innerHTML = `
          <div class="file-index">${index + 1}</div>
          <div class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
          <button class="icon-button" type="button" title="移除">×</button>
        `;
        row.querySelector("button").addEventListener("click", () => {
          selectedFiles.splice(index, 1);
          renderFiles();
          log(`移除 TXT：${file.name}`);
        });
        fileList.appendChild(row);
      });
      generateBtn.disabled = selectedFiles.length === 0;
    }

    function naturalCompare(a, b) {
      return a.localeCompare(b, "zh-CN", { numeric: true, sensitivity: "base" });
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function formValue(id) {
      return document.getElementById(id).value.trim();
    }

    function formChecked(id) {
      return document.getElementById(id).checked;
    }

    async function generateReport() {
      if (!selectedFiles.length) {
        setStatus("error", "还没有 TXT", "先把 TXT 文件拖到左侧输入窗口。");
        return;
      }

      generateBtn.disabled = true;
      downloadBox.classList.remove("show");
      setStatus("warn", "正在生成 Word", "本地脚本正在整理课程目标、内容详情、代码和图题。");
      log(`开始生成，TXT 数量：${selectedFiles.length}；同月同日文件将合并为一天。`);

      const data = new FormData();
      selectedFiles.forEach(file => data.append("notes", file, file.name));
      data.append("outputName", formValue("outputName"));
      data.append("className", formValue("className"));
      data.append("group", formValue("group"));
      data.append("studentId", formValue("studentId"));
      data.append("studentName", formValue("studentName"));
      data.append("college", formValue("college"));
      data.append("majorClass", formValue("majorClass"));
      data.append("templatePath", formValue("templatePath"));
      data.append("maxTasks", formValue("maxTasks") || "8");
      data.append("fillCover", formChecked("fillCover") ? "1" : "0");
      data.append("dayPageBreak", formChecked("dayPageBreak") ? "1" : "0");
      data.append("aiEnabled", formChecked("aiEnabled") ? "1" : "0");
      data.append("aiBaseUrl", formValue("aiBaseUrl"));
      data.append("aiApiKey", formValue("aiApiKey"));
      data.append("aiModel", formValue("aiModel"));
      data.append("aiTemperature", formValue("aiTemperature") || "0.2");

      try {
        const response = await fetch(`${apiBase}/generate`, { method: "POST", body: data });
        const result = await response.json();
        if (!result.ok) {
          throw new Error(result.error || "生成失败");
        }
        downloadName.textContent = result.filename;
        downloadLink.href = `${apiBase}${result.downloadUrl}`;
        downloadLink.setAttribute("download", result.filename);
        downloadBox.classList.add("show");
        setStatus("ok", "Word 已生成", result.message || "可以下载生成的实训报告。");
        log(`生成成功：${result.filename}`);
      } catch (error) {
        setStatus("error", "生成失败", error.message);
        log(`生成失败：${error.message}`);
      } finally {
        generateBtn.disabled = selectedFiles.length === 0;
      }
    }

    async function checkServer() {
      try {
        const response = await fetch(`${apiBase}/health`, { cache: "no-store" });
        const result = await response.json();
        if (result.ok) {
          serverState.textContent = "本地服务已连接";
        } else {
          serverState.textContent = "本地服务异常";
        }
      } catch {
        serverState.textContent = "本地服务未启动";
        setStatus("error", "本地服务未启动", "先运行“启动实训报告网页.bat”或 python 实训报告生成器网页.py。");
      }
    }

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fileInput.click();
      }
    });
    fileInput.addEventListener("change", event => addFiles(event.target.files));

    for (const eventName of ["dragenter", "dragover"]) {
      dropzone.addEventListener(eventName, event => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });
    }
    for (const eventName of ["dragleave", "drop"]) {
      dropzone.addEventListener(eventName, event => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
      });
    }
    dropzone.addEventListener("drop", event => addFiles(event.dataTransfer.files));

    generateBtn.addEventListener("click", generateReport);
    clearFilesBtn.addEventListener("click", () => {
      selectedFiles = [];
      renderFiles();
      fileInput.value = "";
      setStatus("", "等待 TXT 文件", "把 TXT 拖到左侧后点击生成，Word 会在这里出现下载按钮。");
      log("已清空 TXT 列表");
    });
    sampleBtn.addEventListener("click", () => {
      document.querySelectorAll("input[type='text']").forEach(input => input.value = "");
      document.querySelectorAll("input[type='password']").forEach(input => input.value = "");
      document.getElementById("maxTasks").value = "8";
      document.getElementById("aiTemperature").value = "0.2";
      document.getElementById("fillCover").checked = false;
      document.getElementById("dayPageBreak").checked = false;
      document.getElementById("aiEnabled").checked = false;
      document.getElementById("aiBox").classList.remove("show");
      log("已重置表单");
    });
    clearLogBtn.addEventListener("click", () => {
      logBox.textContent = "";
    });

    renderFiles();
    checkServer();
    deepseekPresetBtn.addEventListener("click", () => {
      document.getElementById("aiEnabled").checked = true;
      document.getElementById("aiBox").classList.add("show");
      document.getElementById("aiBaseUrl").value = "https://api.deepseek.com";
      document.getElementById("aiModel").value = "deepseek-v4-flash";
      document.getElementById("aiTemperature").value = "0.2";
      log("已填入 DeepSeek 预设：API 地址 https://api.deepseek.com，模型 deepseek-v4-flash。");
    });
    document.getElementById("aiEnabled").addEventListener("change", event => {
      document.getElementById("aiBox").classList.toggle("show", event.target.checked);
      log(event.target.checked ? "已开启 AI 增强配置。" : "已关闭 AI 增强。");
    });
    log("页面已就绪。");
  </script>
</body>
</html>
